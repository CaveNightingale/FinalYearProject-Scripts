task: wikitext
dataset_path: parquet
dataset_kwargs:
  data_files:
    train: ./data/wikitext-2-raw-v1/wikitext-2-raw-v1-train.parquet
    validation: ./data/wikitext-2-raw-v1/wikitext-2-raw-v1-validation.parquet
    test: ./data/wikitext-2-raw-v1/wikitext-2-raw-v1-test.parquet

output_type: loglikelihood_rolling

training_split: train
validation_split: validation
test_split: test

doc_to_text: ""
doc_to_target: !function preprocess_wikitext.wikitext_detokenizer
process_results: !function preprocess_wikitext.process_results

should_decontaminate: true
doc_to_decontamination_query: "{{page}}"

metric_list:
  - metric: word_perplexity
  - metric: byte_perplexity
  - metric: bits_per_byte

metadata:
  version: 2.0
